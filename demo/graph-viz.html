<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Symbex Graph Visualizer</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
      background: #0d1117;
      color: #e6edf3;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Top bar ─────────────────────────────────────────────────── */
    #topbar {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 7px 14px;
      background: #161b22;
      border-bottom: 1px solid #30363d;
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    #topbar h1 {
      font-size: 13px;
      font-weight: 700;
      color: #58a6ff;
      letter-spacing: 1px;
      margin-right: 2px;
    }
    .sep { width: 1px; height: 18px; background: #30363d; flex-shrink: 0; }

    .btn {
      font-size: 11px;
      font-family: inherit;
      padding: 3px 9px;
      border-radius: 5px;
      border: 1px solid #30363d;
      background: #21262d;
      color: #e6edf3;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
      white-space: nowrap;
    }
    .btn:hover { border-color: #58a6ff; color: #58a6ff; }
    .btn.active { border-color: #3fb950; color: #3fb950; background: #0d2a1a; }

    input[type="file"] { display: none; }

    #search {
      font-size: 11px;
      font-family: inherit;
      color: #e6edf3;
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 5px;
      padding: 3px 9px;
      width: 190px;
      outline: none;
      transition: border-color 0.15s;
    }
    #search:focus { border-color: #58a6ff; }
    #search::placeholder { color: #6e7681; }

    #stats    { font-size: 11px; color: #8b949e; white-space: nowrap; }
    #error-msg{ font-size: 11px; color: #f78166; }
    #reset-btn{ margin-left: auto; }

    /* ── Canvas ────────────────────────────────────────────────────── */
    #main { flex: 1; position: relative; overflow: hidden; }
    svg   { width: 100%; height: 100%; display: block; }

    /* ── Edges ─────────────────────────────────────────────────────── */
    .edge { fill: none; }
    .edge-defines  { stroke: #444c56; stroke-width: 1px; }
    .edge-imports  { stroke: #388bfd; stroke-width: 1px; stroke-dasharray: 5 3; opacity: .7; }
    .edge-inherits { stroke: #a371f7; stroke-width: 1px; stroke-dasharray: 3 2; opacity: .7; }
    .edge.sf { opacity: .04; }

    /* ── Nodes ─────────────────────────────────────────────────────── */
    .node { cursor: pointer; }
    .node circle  { stroke-width: 1.5; }
    .node circle:hover { filter: brightness(1.35); }
    .node text {
      font-size: 10px;
      fill: #e6edf3;
      pointer-events: none;
      dominant-baseline: middle;
      user-select: none;
    }
    .node.sf circle { opacity: .07; }
    .node.sf text   { opacity: .04; }
    .node.sel circle { stroke-width: 2.5; filter: brightness(1.3); }
    .node.no-lbl text { display: none; }

    /* ── Filter panel ──────────────────────────────────────────────── */
    #panel-filters {
      position: absolute;
      bottom: 14px;
      left: 14px;
      background: rgba(22,27,34,.94);
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 11px;
      backdrop-filter: blur(4px);
      max-width: 230px;
      user-select: none;
    }
    .fs { margin-bottom: 8px; }
    .fs:last-child { margin-bottom: 0; }
    .ft {
      font-size: 9px;
      color: #6e7681;
      text-transform: uppercase;
      letter-spacing: .7px;
      margin-bottom: 5px;
    }
    .chips { display: flex; flex-wrap: wrap; gap: 4px; }
    .chip {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 2px 7px;
      border-radius: 10px;
      border: 1px solid transparent;
      cursor: pointer;
      font-size: 10px;
      transition: opacity .15s, border-color .15s;
      white-space: nowrap;
    }
    .chip:hover { border-color: currentColor; }
    .chip.off { opacity: .3; }
    .chip .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .echip {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 2px 7px;
      border-radius: 4px;
      border: 1px solid #30363d;
      cursor: pointer;
      font-size: 10px;
      color: #8b949e;
      transition: border-color .15s, opacity .15s;
    }
    .echip:hover { border-color: #58a6ff; }
    .echip.off { opacity: .3; }
    .edash { width: 16px; height: 2px; border-radius: 1px; flex-shrink: 0; }

    /* ── Detail panel ──────────────────────────────────────────────── */
    #panel-detail {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 275px;
      background: rgba(22,27,34,.96);
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 11px;
      backdrop-filter: blur(6px);
      box-shadow: 0 8px 32px rgba(0,0,0,.55);
      display: none;
      max-height: calc(100vh - 100px);
      overflow-y: auto;
    }
    #panel-detail.vis { display: block; }
    .dh { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 9px; }
    .dname { font-weight: 600; font-size: 12px; color: #e6edf3; word-break: break-all; }
    .dclose { cursor: pointer; color: #8b949e; font-size: 14px; line-height: 1; padding: 0 2px; flex-shrink: 0; }
    .dclose:hover { color: #e6edf3; }
    .dbadge {
      display: inline-block;
      padding: 1px 7px;
      border-radius: 5px;
      font-size: 10px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .dsec {
      font-size: 9px;
      color: #6e7681;
      text-transform: uppercase;
      letter-spacing: .7px;
      margin: 8px 0 4px;
      border-top: 1px solid #21262d;
      padding-top: 7px;
    }
    .drow { display: flex; gap: 6px; margin-bottom: 3px; line-height: 1.5; }
    .dkey { color: #8b949e; flex-shrink: 0; min-width: 64px; }
    .dval { color: #c9d1d9; word-break: break-all; }
    .dpath { display: flex; flex-wrap: wrap; gap: 2px; margin-bottom: 4px; }
    .dseg { font-size: 10px; color: #8b949e; }
    .dseg:not(:last-child)::after { content: ' ›'; color: #6e7681; margin-left: 2px; }
    .dseg:last-child { color: #e6edf3; font-weight: 600; }
    .nlist { display: flex; flex-direction: column; gap: 3px; margin-top: 3px; }
    .ni {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 10px;
      color: #8b949e;
      cursor: pointer;
      padding: 2px 4px;
      border-radius: 3px;
      transition: background .1s, color .1s;
    }
    .ni:hover { background: #21262d; color: #e6edf3; }
    .ndot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .nkind { color: #6e7681; font-size: 9px; margin-left: auto; }

    /* ── Tooltip ────────────────────────────────────────────────────── */
    #tooltip {
      position: fixed;
      visibility: hidden;
      background: #1c2128;
      border: 1px solid #30363d;
      border-radius: 7px;
      padding: 8px 12px;
      font-size: 11px;
      pointer-events: none;
      max-width: 300px;
      line-height: 1.65;
      box-shadow: 0 4px 16px rgba(0,0,0,.5);
      z-index: 100;
    }
    .ttb { display: inline-block; padding: 1px 6px; border-radius: 4px; font-size: 10px; font-weight: 600; margin-bottom: 4px; }
    .ttn { font-weight: 600; font-size: 12px; color: #e6edf3; margin-bottom: 3px; }
    .ttr { display: flex; gap: 6px; }
    .ttk { color: #8b949e; flex-shrink: 0; }
    .ttv { color: #c9d1d9; word-break: break-word; }

    /* ── Paste modal ────────────────────────────────────────────────── */
    #modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.72);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    #modal-overlay.open { display: flex; }
    #modal {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 18px 20px;
      width: min(580px, 92vw);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #modal h2 { font-size: 13px; }
    #modal p  { font-size: 11px; color: #8b949e; }
    #paste-area {
      width: 100%;
      height: 200px;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #e6edf3;
      font-family: inherit;
      font-size: 11px;
      padding: 8px;
      resize: vertical;
      outline: none;
    }
    #paste-area:focus { border-color: #58a6ff; }
    #modal-error { font-size: 11px; color: #f78166; min-height: 1em; }
    .mactions { display: flex; gap: 8px; justify-content: flex-end; }
  </style>
</head>
<body>

<div id="topbar">
  <h1>symbex</h1>

  <label for="file-input" class="btn" style="cursor:pointer">Load JSON</label>
  <input type="file" id="file-input" accept=".json,application/json" />
  <button class="btn" id="paste-btn">Paste JSON</button>
  <button class="btn" id="sample-btn">Load sample</button>

  <div class="sep"></div>

  <input type="text" id="search" placeholder="search nodes…" autocomplete="off" />
  <button class="btn active" id="labels-btn">Labels</button>

  <span id="stats"></span>
  <span id="error-msg"></span>
  <button class="btn" id="reset-btn">⊡ Reset zoom</button>
</div>

<div id="main">
  <svg id="svg">
    <defs>
      <marker id="arr-defines"  markerWidth="6" markerHeight="6" refX="6" refY="3" orient="auto">
        <path d="M0,0.5 L0,5.5 L5.5,3 z" fill="#555" />
      </marker>
      <marker id="arr-imports"  markerWidth="6" markerHeight="6" refX="6" refY="3" orient="auto">
        <path d="M0,0.5 L0,5.5 L5.5,3 z" fill="#388bfd" opacity=".9" />
      </marker>
      <marker id="arr-inherits" markerWidth="6" markerHeight="6" refX="6" refY="3" orient="auto">
        <path d="M0,0.5 L0,5.5 L5.5,3 z" fill="#a371f7" opacity=".9" />
      </marker>
    </defs>
    <g id="root"></g>
  </svg>

  <div id="panel-filters"></div>

  <div id="panel-detail">
    <div class="dh">
      <div class="dname" id="d-name"></div>
      <div class="dclose" id="d-close">✕</div>
    </div>
    <div id="d-body"></div>
  </div>
</div>

<div id="tooltip"></div>

<div id="modal-overlay">
  <div id="modal">
    <h2>Paste graph JSON</h2>
    <p>Paste the output of <code>symbex --list</code> — any <code>{ nodes, edges }</code> JSON.</p>
    <textarea id="paste-area" placeholder='{ "nodes": [...], "edges": [...] }'></textarea>
    <div id="modal-error"></div>
    <div class="mactions">
      <button class="btn" id="modal-cancel">Cancel</button>
      <button class="btn" id="modal-load" style="border-color:#3fb950;color:#3fb950">Load</button>
    </div>
  </div>
</div>

<script>
// ── Kind config: fill, stroke, radius ─────────────────────────────────────
const KINDS = {
  module:          { fill: '#1c2128', stroke: '#adbac7', r: 13 },
  class:           { fill: '#0d2845', stroke: '#58a6ff', r: 10 },
  abstract_class:  { fill: '#152d50', stroke: '#79c0ff', r: 10 },
  interface:       { fill: '#082030', stroke: '#39d0d8', r:  9 },
  type_alias:      { fill: '#1f0e2a', stroke: '#d2a8ff', r:  8 },
  function:        { fill: '#0a2a18', stroke: '#3fb950', r:  8 },
  method:          { fill: '#1a0e30', stroke: '#a371f7', r:  7 },
  abstract_method: { fill: '#231040', stroke: '#bc8cff', r:  7 },
  member:          { fill: '#2a1c00', stroke: '#d29922', r:  6 },
  variable:        { fill: '#280d0a', stroke: '#f78166', r:  5 },
  pattern:         { fill: '#091f1f', stroke: '#56d364', r:  5 },
  import:          { fill: '#001828', stroke: '#388bfd', r:  5 },
};

const EDGES = {
  defines:  { cls: 'edge-defines',  color: '#555',    marker: 'arr-defines'  },
  imports:  { cls: 'edge-imports',  color: '#388bfd', marker: 'arr-imports'  },
  inherits: { cls: 'edge-inherits', color: '#a371f7', marker: 'arr-inherits' },
};

function kfg(d) {
  if (typeof d.path?.[0] === 'string' &&
      (d.path[0].startsWith('node:') || d.path[0].startsWith('@') && d.path.length === 1)) {
    return KINDS.import;
  }
  return KINDS[d.kind] ?? KINDS.module;
}
function nr(d) { return kfg(d).r ?? 6; }

// ── State ──────────────────────────────────────────────────────────────────
let rawData      = null;
let hiddenKinds  = new Set();
let hiddenEdges  = new Set();
let showLabels   = true;
let searchQ      = '';
let selectedNode = null;
let currentLinks = [];

// ── D3 refs ────────────────────────────────────────────────────────────────
let nodeSel, linkSel, activeSim;

const svgEl    = d3.select('#svg');
const rootEl   = d3.select('#root');
const tooltip  = document.getElementById('tooltip');
const statsEl  = document.getElementById('stats');
const errorEl  = document.getElementById('error-msg');
const detPanel = document.getElementById('panel-detail');
const dBody    = document.getElementById('d-body');
const dName    = document.getElementById('d-name');

// ── Zoom ───────────────────────────────────────────────────────────────────
const zoom = d3.zoom().scaleExtent([0.05, 12])
  .on('zoom', e => rootEl.attr('transform', e.transform));
svgEl.call(zoom);

function resetZoom() {
  const W = svgEl.node().clientWidth, H = svgEl.node().clientHeight;
  svgEl.transition().duration(500)
    .call(zoom.transform, d3.zoomIdentity.translate(W / 2, H / 2).scale(0.85));
}
document.getElementById('reset-btn').addEventListener('click', resetZoom);

// ── Load ───────────────────────────────────────────────────────────────────
function loadGraph(data) {
  if (!Array.isArray(data?.nodes) || !Array.isArray(data?.edges))
    throw new Error('JSON must have "nodes" and "edges" arrays.');
  rawData = data;
  selectedNode = null;
  detPanel.classList.remove('vis');
  errorEl.textContent = '';
  buildFilterPanel();
  renderGraph();
}

// ── Render ─────────────────────────────────────────────────────────────────
function renderGraph() {
  if (!rawData) return;

  activeSim?.stop();
  activeSim = null;
  rootEl.selectAll('*').remove();
  tooltip.style.visibility = 'hidden';

  const visNodes = rawData.nodes.filter(n => !hiddenKinds.has(n.kind));
  const visIds   = new Set(visNodes.map(n => n.id));
  const visEdges = rawData.edges.filter(e =>
    !hiddenEdges.has(e.kind) && visIds.has(e.from) && visIds.has(e.to));

  const nodes = visNodes.map(n => ({ ...n }));
  const links = visEdges.map(e => ({
    source: e.from, target: e.to, kind: e.kind,
  }));
  currentLinks = links;

  statsEl.textContent = `${nodes.length} nodes · ${links.length} edges`;

  // Simulation
  const sim = d3.forceSimulation(nodes)
    .force('link', d3.forceLink(links).id(d => d.id)
      .distance(d => d.kind === 'imports' ? 190 : 52)
      .strength(d => d.kind === 'imports' ? 0.22 : 0.88))
    .force('charge', d3.forceManyBody().strength(d => {
      if (d.kind === 'module')  return -420;
      if (d.kind === 'class' || d.kind === 'abstract_class') return -260;
      if (d.type === 'scope')   return -130;
      return -55;
    }))
    .force('center', d3.forceCenter(0, 0))
    .force('collide', d3.forceCollide().radius(d => nr(d) + 3))
    .alphaDecay(0.022);

  activeSim = sim;

  // Edges
  const edgeG = rootEl.append('g');
  linkSel = edgeG.selectAll('path.edge').data(links).join('path')
    .attr('class',         d => `edge ${EDGES[d.kind]?.cls ?? ''}`)
    .attr('stroke',        d => EDGES[d.kind]?.color ?? '#555')
    .attr('marker-end',    d => `url(#${EDGES[d.kind]?.marker ?? 'arr-defines'})`);

  // Nodes
  const nodeG = rootEl.append('g');
  nodeSel = nodeG.selectAll('g.node').data(nodes, d => d.id).join('g')
    .attr('class', `node${showLabels ? '' : ' no-lbl'}`)
    .call(d3.drag()
      .on('start', (ev, d) => {
        if (!ev.active) sim.alphaTarget(0.3).restart();
        d.fx = d.x; d.fy = d.y;
      })
      .on('drag',  (ev, d) => { d.fx = ev.x; d.fy = ev.y; })
      .on('end',   (ev, d) => {
        if (!ev.active) sim.alphaTarget(0);
        d.fx = null; d.fy = null;
      }));

  nodeSel.append('circle')
    .attr('r',      d => nr(d))
    .attr('fill',   d => kfg(d).fill)
    .attr('stroke', d => kfg(d).stroke);

  nodeSel.append('text')
    .attr('x', d => nr(d) + 4)
    .attr('y', 0)
    .text(d => d.path?.[d.path.length - 1] ?? d.id);

  // Interaction
  nodeSel
    .on('mouseover', (ev, d) => {
      if (!selectedNode) highlightNeighbours(d);
      tooltip.innerHTML = buildTooltip(d);
      tooltip.style.visibility = 'visible';
    })
    .on('mousemove', ev => {
      tooltip.style.top  = (ev.clientY - 12) + 'px';
      tooltip.style.left = (ev.clientX + 16) + 'px';
    })
    .on('mouseout', () => {
      tooltip.style.visibility = 'hidden';
      if (!selectedNode) clearFade();
    })
    .on('click', (ev, d) => {
      ev.stopPropagation();
      selectedNode = d;
      nodeSel.classed('sel', n => n.id === d.id);
      highlightNeighbours(d);
      showDetail(d);
    });

  svgEl.on('click', () => {
    selectedNode = null;
    clearFade();
    nodeSel?.classed('sel', false);
    detPanel.classList.remove('vis');
  });

  // Tick
  sim.on('tick', () => {
    linkSel.attr('d', edgePath);
    nodeSel.attr('transform', d => `translate(${d.x ?? 0},${d.y ?? 0})`);
  });
  sim.on('end', resetZoom);

  applySearch();
}

// ── Edge path (arrows offset from node boundary) ───────────────────────────
function edgePath(d) {
  const sx = d.source.x ?? 0, sy = d.source.y ?? 0;
  const tx = d.target.x ?? 0, ty = d.target.y ?? 0;
  const dx = tx - sx, dy = ty - sy;
  const len = Math.hypot(dx, dy) || 1;
  const x1 = sx + dx / len * (nr(d.source) + 1);
  const y1 = sy + dy / len * (nr(d.source) + 1);
  const x2 = tx - dx / len * (nr(d.target) + 8);
  const y2 = ty - dy / len * (nr(d.target) + 8);
  return `M${x1},${y1}L${x2},${y2}`;
}

// ── Highlight ─────────────────────────────────────────────────────────────
function highlightNeighbours(d) {
  const nbs = new Set([d.id]);
  currentLinks.forEach(l => {
    if (l.source.id === d.id) nbs.add(l.target.id);
    if (l.target.id === d.id) nbs.add(l.source.id);
  });
  nodeSel?.classed('sf', n => !nbs.has(n.id));
  linkSel?.classed('sf', l =>
    l.source.id !== d.id && l.target.id !== d.id);
}

function clearFade() {
  nodeSel?.classed('sf', false);
  linkSel?.classed('sf', false);
}

// ── Tooltip ───────────────────────────────────────────────────────────────
function buildTooltip(d) {
  const c = kfg(d).stroke;
  const row = (k, v) => v != null
    ? `<div class="ttr"><span class="ttk">${k}</span><span class="ttv">${v}</span></div>` : '';
  const props = d.props
    ? Object.entries(d.props).filter(([,v]) => v != null && v !== false)
        .map(([k,v]) => row(k, String(v))).join('')
    : '';
  return `
    <span class="ttb" style="background:${c}22;color:${c}">${d.kind}</span>
    <div class="ttn">${d.path?.[d.path.length - 1] ?? d.id}</div>
    ${row('type', d.type)}
    ${row('lines', d.range?.line?.replace(/L/g, ''))}
    ${props}`;
}

// ── Detail panel ──────────────────────────────────────────────────────────
function showDetail(d) {
  const c = kfg(d).stroke;
  dName.textContent = d.path?.[d.path.length - 1] ?? d.id;

  const nodeMap  = new Map(rawData.nodes.map(n => [n.id, n]));
  const outEdges = currentLinks.filter(l => l.source.id === d.id);
  const inEdges  = currentLinks.filter(l => l.target.id === d.id);

  const row = (k, v) => v != null
    ? `<div class="drow"><span class="dkey">${k}</span><span class="dval">${v}</span></div>` : '';

  const pathHtml = `<div class="dpath">${
    (d.path ?? []).map(s => `<span class="dseg">${s}</span>`).join('')
  }</div>`;

  const propsHtml = d.props
    ? Object.entries(d.props).filter(([,v]) => v != null && v !== false)
        .map(([k,v]) => row(k, String(v))).join('')
    : '';

  function edgeGroup(edges, label) {
    if (!edges.length) return '';
    const items = edges.map(e => {
      const isOut  = e.source.id === d.id;
      const oId    = isOut ? e.target.id : e.source.id;
      const other  = nodeMap.get(oId) ?? { id: oId, path: [oId], kind: '?' };
      const oc     = kfg(other);
      const oname  = other.path?.[other.path.length - 1] ?? other.id;
      return `<div class="ni" data-id="${other.id}">
        <div class="ndot" style="background:${oc.stroke}"></div>
        <span>${oname}</span>
        <span class="nkind">${e.kind}</span>
      </div>`;
    }).join('');
    return `<div class="dsec">${label}</div><div class="nlist">${items}</div>`;
  }

  dBody.innerHTML = `
    <span class="dbadge" style="background:${c}22;color:${c}">${d.kind} · ${d.type}</span>
    ${pathHtml}
    ${row('id', d.id)}
    ${row('lines', d.range?.line?.replace(/L/g, ''))}
    ${row('bytes', d.range?.byte)}
    ${propsHtml ? `<div class="dsec">Properties</div>${propsHtml}` : ''}
    ${edgeGroup(outEdges, 'Outgoing')}
    ${edgeGroup(inEdges, 'Incoming')}`;

  // Click neighbour → navigate
  dBody.querySelectorAll('.ni').forEach(el => {
    el.addEventListener('click', () => {
      const id  = el.dataset.id;
      const tgt = nodeSel?.data().find(n => n.id === id);
      if (!tgt) return;
      selectedNode = tgt;
      nodeSel.classed('sel', n => n.id === id);
      highlightNeighbours(tgt);
      showDetail(tgt);
      // Pan to node
      const t = d3.zoomTransform(svgEl.node());
      const W = svgEl.node().clientWidth, H = svgEl.node().clientHeight;
      svgEl.transition().duration(380).call(
        zoom.transform,
        d3.zoomIdentity.translate(W / 2 - t.k * tgt.x, H / 2 - t.k * tgt.y).scale(t.k)
      );
    });
  });

  detPanel.classList.add('vis');
}

document.getElementById('d-close').addEventListener('click', () => {
  selectedNode = null;
  clearFade();
  nodeSel?.classed('sel', false);
  detPanel.classList.remove('vis');
});

// ── Filter panel ──────────────────────────────────────────────────────────
function buildFilterPanel() {
  if (!rawData) return;

  const kinds     = [...new Set(rawData.nodes.map(n => n.kind))].sort();
  const edgeKinds = [...new Set(rawData.edges.map(e => e.kind))].sort();

  const kindChips = kinds.map(k => {
    const c = KINDS[k] ?? KINDS.module;
    return `<div class="chip${hiddenKinds.has(k) ? ' off' : ''}" data-kind="${k}">
      <div class="dot" style="background:${c.stroke}"></div>${k}</div>`;
  }).join('');

  const edgeChips = edgeKinds.map(k => {
    const cfg = EDGES[k] ?? { color: '#555' };
    return `<div class="echip${hiddenEdges.has(k) ? ' off' : ''}" data-edge="${k}">
      <div class="edash" style="background:${cfg.color}"></div>${k}</div>`;
  }).join('');

  document.getElementById('panel-filters').innerHTML = `
    <div class="fs">
      <div class="ft">Node kind</div>
      <div class="chips" id="kind-chips">${kindChips}</div>
    </div>
    <div class="fs">
      <div class="ft">Edge kind</div>
      <div class="chips" id="edge-chips">${edgeChips}</div>
    </div>`;

  document.querySelectorAll('#kind-chips .chip').forEach(el => {
    el.addEventListener('click', () => {
      const k = el.dataset.kind;
      hiddenKinds.has(k) ? hiddenKinds.delete(k) : hiddenKinds.add(k);
      el.classList.toggle('off', hiddenKinds.has(k));
      renderGraph();
    });
  });

  document.querySelectorAll('#edge-chips .echip').forEach(el => {
    el.addEventListener('click', () => {
      const k = el.dataset.edge;
      hiddenEdges.has(k) ? hiddenEdges.delete(k) : hiddenEdges.add(k);
      el.classList.toggle('off', hiddenEdges.has(k));
      renderGraph();
    });
  });
}

// ── Search ────────────────────────────────────────────────────────────────
function applySearch() {
  if (!nodeSel) return;
  const q = searchQ.trim().toLowerCase();
  if (!q) { clearFade(); return; }

  const hits = new Set();
  nodeSel.each(d => {
    const last = (d.path?.[d.path.length - 1] ?? '').toLowerCase();
    const full = (d.path ?? []).join(' ').toLowerCase();
    if (last.includes(q) || full.includes(q)) hits.add(d.id);
  });

  nodeSel.classed('sf', d => !hits.has(d.id));
  linkSel?.classed('sf', l =>
    !hits.has(l.source.id) && !hits.has(l.target.id));
}

document.getElementById('search').addEventListener('input', e => {
  searchQ = e.target.value;
  if (!selectedNode) applySearch();
});

// ── Labels toggle ─────────────────────────────────────────────────────────
document.getElementById('labels-btn').addEventListener('click', function () {
  showLabels = !showLabels;
  this.classList.toggle('active', showLabels);
  nodeSel?.classed('no-lbl', !showLabels);
});

// ── File input ────────────────────────────────────────────────────────────
document.getElementById('file-input').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try { parseAndLoad(ev.target.result); }
    catch (err) { errorEl.textContent = err.message; }
  };
  reader.readAsText(file);
  e.target.value = '';
});

// ── Paste modal ───────────────────────────────────────────────────────────
const overlay   = document.getElementById('modal-overlay');
const pasteArea = document.getElementById('paste-area');
const modalErr  = document.getElementById('modal-error');

document.getElementById('paste-btn').addEventListener('click', () => {
  pasteArea.value = ''; modalErr.textContent = '';
  overlay.classList.add('open'); pasteArea.focus();
});
document.getElementById('modal-cancel').addEventListener('click', () =>
  overlay.classList.remove('open'));
overlay.addEventListener('click', e => {
  if (e.target === overlay) overlay.classList.remove('open');
});
document.getElementById('modal-load').addEventListener('click', () => {
  try { parseAndLoad(pasteArea.value.trim()); overlay.classList.remove('open'); }
  catch (err) { modalErr.textContent = err.message; }
});
pasteArea.addEventListener('keydown', e => {
  if (e.key === 'Enter' && (e.metaKey || e.ctrlKey))
    document.getElementById('modal-load').click();
  if (e.key === 'Escape') overlay.classList.remove('open');
});

function parseAndLoad(text) {
  let data;
  try { data = JSON.parse(text); }
  catch (e) { throw new Error(`Invalid JSON: ${e.message}`); }
  loadGraph(data);
}
