<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Symbex Radial Tree</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
      background: #0d1117;
      color: #e6edf3;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Top bar ───────────────────────────────────────────────── */
    #topbar {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 7px 14px;
      background: #161b22;
      border-bottom: 1px solid #30363d;
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    #topbar h1 { font-size: 13px; font-weight: 700; color: #58a6ff; letter-spacing: 1px; margin-right: 2px; }
    .sep { width: 1px; height: 18px; background: #30363d; flex-shrink: 0; }

    .btn {
      font-size: 11px; font-family: inherit; padding: 3px 9px;
      border-radius: 5px; border: 1px solid #30363d; background: #21262d;
      color: #e6edf3; cursor: pointer;
      transition: border-color .15s, color .15s, background .15s;
      white-space: nowrap;
    }
    .btn:hover  { border-color: #58a6ff; color: #58a6ff; }
    .btn.active { border-color: #3fb950; color: #3fb950; background: #0d2a1a; }

    input[type="file"] { display: none; }

    #search {
      font-size: 11px; font-family: inherit; color: #e6edf3;
      background: #21262d; border: 1px solid #30363d; border-radius: 5px;
      padding: 3px 9px; width: 190px; outline: none;
      transition: border-color .15s;
    }
    #search:focus       { border-color: #58a6ff; }
    #search::placeholder{ color: #6e7681; }

    #stats     { font-size: 11px; color: #8b949e; white-space: nowrap; }
    #error-msg { font-size: 11px; color: #f78166; }
    #reset-btn { margin-left: auto; }

    /* ── Canvas ────────────────────────────────────────────────── */
    #main { flex: 1; position: relative; overflow: hidden; }
    svg   { width: 100%; height: 100%; display: block; }

    /* ── Tree edges ────────────────────────────────────────────── */
    .edge       { fill: none; }
    .edge-defines  { stroke: #444c56; stroke-width: 1px; }
    .edge-contains { stroke: #7a6a00; stroke-width: 1px; stroke-dasharray: 4 2; opacity: .75; }
    .edge-imports  { stroke: #388bfd; stroke-width: 1px; stroke-dasharray: 5 3; opacity: .65; }
    .edge-extends  { stroke: #d2a8ff; stroke-width: 1px; stroke-dasharray: 3 2; opacity: .65; }
    .edge.sf { opacity: .04; }

    /* ── Nodes ─────────────────────────────────────────────────── */
    .node { cursor: pointer; }
    .node circle { stroke-width: 1.5; }
    .node circle:hover { filter: brightness(1.35); }
    .node text {
      font-size: 10px; fill: #e6edf3;
      pointer-events: none; dominant-baseline: middle; user-select: none;
    }
    .node.sf     circle { opacity: .07; }
    .node.sf     text   { opacity: .04; }
    .node.sel    circle { stroke-width: 2.5; filter: brightness(1.3); }
    .node.no-lbl text   { display: none; }

    /* ── Filter panel ──────────────────────────────────────────── */
    #panel-filters {
      position: absolute; bottom: 14px; left: 14px;
      background: rgba(22,27,34,.94); border: 1px solid #30363d;
      border-radius: 8px; padding: 10px 12px; font-size: 11px;
      backdrop-filter: blur(4px); max-width: 230px; user-select: none;
    }
    .fs { margin-bottom: 8px; }
    .fs:last-child { margin-bottom: 0; }
    .ft { font-size: 9px; color: #6e7681; text-transform: uppercase; letter-spacing: .7px; margin-bottom: 5px; }
    .chips { display: flex; flex-wrap: wrap; gap: 4px; }
    .chip {
      display: flex; align-items: center; gap: 4px; padding: 2px 7px;
      border-radius: 10px; border: 1px solid transparent; cursor: pointer;
      font-size: 10px; transition: opacity .15s, border-color .15s; white-space: nowrap;
    }
    .chip:hover { border-color: currentColor; }
    .chip.off   { opacity: .3; }
    .chip .dot  { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .echip {
      display: flex; align-items: center; gap: 5px; padding: 2px 7px;
      border-radius: 4px; border: 1px solid #30363d; cursor: pointer;
      font-size: 10px; color: #8b949e; transition: border-color .15s, opacity .15s;
    }
    .echip:hover { border-color: #58a6ff; }
    .echip.off   { opacity: .3; }
    .edash { width: 16px; height: 2px; border-radius: 1px; flex-shrink: 0; }

    /* ── Detail panel ──────────────────────────────────────────── */
    #panel-detail {
      position: absolute; top: 12px; right: 12px; width: 275px;
      background: rgba(22,27,34,.96); border: 1px solid #30363d;
      border-radius: 8px; padding: 12px 14px; font-size: 11px;
      backdrop-filter: blur(6px); box-shadow: 0 8px 32px rgba(0,0,0,.55);
      display: none; max-height: calc(100vh - 100px); overflow-y: auto;
    }
    #panel-detail.vis { display: block; }
    .dh  { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 9px; }
    .dname  { font-weight: 600; font-size: 12px; color: #e6edf3; word-break: break-all; }
    .dclose { cursor: pointer; color: #8b949e; font-size: 14px; line-height: 1; padding: 0 2px; flex-shrink: 0; }
    .dclose:hover { color: #e6edf3; }
    .dbadge { display: inline-block; padding: 1px 7px; border-radius: 5px; font-size: 10px; font-weight: 600; margin-bottom: 8px; }
    .dsec { font-size: 9px; color: #6e7681; text-transform: uppercase; letter-spacing: .7px; margin: 8px 0 4px; border-top: 1px solid #21262d; padding-top: 7px; }
    .drow { display: flex; gap: 6px; margin-bottom: 3px; line-height: 1.5; }
    .dkey { color: #8b949e; flex-shrink: 0; min-width: 64px; }
    .dval { color: #c9d1d9; word-break: break-all; }
    .dpath  { display: flex; flex-wrap: wrap; gap: 2px; margin-bottom: 4px; }
    .dseg   { font-size: 10px; color: #8b949e; }
    .dseg:not(:last-child)::after { content: ' ›'; color: #6e7681; margin-left: 2px; }
    .dseg:last-child { color: #e6edf3; font-weight: 600; }
    .nlist  { display: flex; flex-direction: column; gap: 3px; margin-top: 3px; }
    .ni     { display: flex; align-items: center; gap: 5px; font-size: 10px; color: #8b949e; cursor: pointer; padding: 2px 4px; border-radius: 3px; transition: background .1s, color .1s; }
    .ni:hover { background: #21262d; color: #e6edf3; }
    .ndot  { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .nkind { color: #6e7681; font-size: 9px; margin-left: auto; }

    /* ── Tooltip ───────────────────────────────────────────────── */
    #tooltip {
      position: fixed; visibility: hidden; background: #1c2128;
      border: 1px solid #30363d; border-radius: 7px; padding: 8px 12px;
      font-size: 11px; pointer-events: none; max-width: 300px;
      line-height: 1.65; box-shadow: 0 4px 16px rgba(0,0,0,.5); z-index: 100;
    }
    .ttb { display: inline-block; padding: 1px 6px; border-radius: 4px; font-size: 10px; font-weight: 600; margin-bottom: 4px; }
    .ttn { font-weight: 600; font-size: 12px; color: #e6edf3; margin-bottom: 3px; }
    .ttr { display: flex; gap: 6px; }
    .ttk { color: #8b949e; flex-shrink: 0; }
    .ttv { color: #c9d1d9; word-break: break-word; }

    /* ── Paste modal ───────────────────────────────────────────── */
    #modal-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,.72);
      z-index: 200; align-items: center; justify-content: center;
    }
    #modal-overlay.open { display: flex; }
    #modal { background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 18px 20px; width: min(580px,92vw); display: flex; flex-direction: column; gap: 10px; }
    #modal h2 { font-size: 13px; }
    #modal p  { font-size: 11px; color: #8b949e; }
    #paste-area { width: 100%; height: 200px; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; color: #e6edf3; font-family: inherit; font-size: 11px; padding: 8px; resize: vertical; outline: none; }
    #paste-area:focus { border-color: #58a6ff; }
    #modal-error { font-size: 11px; color: #f78166; min-height: 1em; }
    .mactions { display: flex; gap: 8px; justify-content: flex-end; }
  </style>
</head>
<body>

<div id="topbar">
  <h1>symbex</h1>
  <span style="font-size:10px;color:#6e7681;margin-right:2px">radial tree</span>

  <label for="file-input" class="btn" style="cursor:pointer">Load JSON</label>
  <input type="file" id="file-input" accept=".json,application/json" />
  <button class="btn" id="paste-btn">Paste JSON</button>
  <button class="btn" id="sample-btn">Load sample</button>

  <div class="sep"></div>

  <input type="text" id="search" placeholder="search nodes…" autocomplete="off" />
  <button class="btn active" id="labels-btn">Labels</button>

  <span id="stats"></span>
  <span id="error-msg"></span>
  <button class="btn" id="reset-btn">⊡ Reset zoom</button>
</div>

<div id="main">
  <svg id="svg">
    <defs>
      <marker id="arr-contains" markerWidth="6" markerHeight="6" refX="6" refY="3" orient="auto">
        <path d="M0,0.5 L0,5.5 L5.5,3 z" fill="#7a6a00" opacity=".9" />
      </marker>
      <marker id="arr-imports"  markerWidth="6" markerHeight="6" refX="6" refY="3" orient="auto">
        <path d="M0,0.5 L0,5.5 L5.5,3 z" fill="#388bfd" opacity=".9" />
      </marker>
      <marker id="arr-extends"  markerWidth="6" markerHeight="6" refX="6" refY="3" orient="auto">
        <path d="M0,0.5 L0,5.5 L5.5,3 z" fill="#d2a8ff" opacity=".9" />
      </marker>
    </defs>
    <g id="root"></g>
  </svg>

  <div id="panel-filters"></div>

  <div id="panel-detail">
    <div class="dh">
      <div class="dname" id="d-name"></div>
      <div class="dclose" id="d-close">✕</div>
    </div>
    <div id="d-body"></div>
  </div>
</div>

<div id="tooltip"></div>

<div id="modal-overlay">
  <div id="modal">
    <h2>Paste graph JSON</h2>
    <p>Paste the output of <code>symbex --list</code> — any <code>{ nodes, edges }</code> JSON.</p>
    <textarea id="paste-area" placeholder='{ "nodes": [...], "edges": [...] }'></textarea>
    <div id="modal-error"></div>
    <div class="mactions">
      <button class="btn" id="modal-cancel">Cancel</button>
      <button class="btn" id="modal-load" style="border-color:#3fb950;color:#3fb950">Load</button>
    </div>
  </div>
</div>

<script>
// ── Kind config ────────────────────────────────────────────────────────────
const KINDS = {
  file:            { fill: '#1c2128', stroke: '#adbac7', r: 13 },
  module:          { fill: '#1c2128', stroke: '#adbac7', r: 13 },
  class:           { fill: '#0d2845', stroke: '#58a6ff', r: 10 },
  abstract_class:  { fill: '#152d50', stroke: '#79c0ff', r: 10 },
  interface:       { fill: '#082030', stroke: '#39d0d8', r:  9 },
  type_alias:      { fill: '#1f0e2a', stroke: '#d2a8ff', r:  8 },
  function:        { fill: '#0a2a18', stroke: '#3fb950', r:  8 },
  method:          { fill: '#1a0e30', stroke: '#a371f7', r:  7 },
  abstract_method: { fill: '#231040', stroke: '#bc8cff', r:  7 },
  member:          { fill: '#2a1c00', stroke: '#d29922', r:  6 },
  variable:        { fill: '#280d0a', stroke: '#f78166', r:  5 },
  pattern:         { fill: '#091f1f', stroke: '#56d364', r:  5 },
  import:          { fill: '#001828', stroke: '#388bfd', r:  5 },
  parameter:       { fill: '#1a0f0a', stroke: '#c9733b', r:  5 },
  iife:            { fill: '#1c1200', stroke: '#e3b341', r:  8 },
};

const EDGES = {
  defines:  { cls: 'edge-defines',  color: '#555'    },
  contains: { cls: 'edge-contains', color: '#7a6a00', marker: 'arr-contains' },
  imports:  { cls: 'edge-imports',  color: '#388bfd', marker: 'arr-imports'  },
  extends:  { cls: 'edge-extends',  color: '#d2a8ff', marker: 'arr-extends'  },
};

function kfg(d) {
  if (d.at?.external) return KINDS.import;
  return KINDS[d.kind] ?? KINDS.module;
}
function nr(d) { return kfg(d).r ?? 6; }

// ── at field helpers ────────────────────────────────────────────────────────
function formatAt(at) {
  if (!at) return null;
  if (at.name != null) return at.external ? `external: ${at.name}` : at.name;
  return at.line?.replace(/L/g, '') ?? null;
}
function atBytes(at) {
  if (!at || at.name != null) return null;
  return at.byte ?? null;
}

// ── State ──────────────────────────────────────────────────────────────────
let rawData      = null;
let hiddenKinds  = new Set();
let hiddenEdges  = new Set();
let showLabels   = true;
let searchQ      = '';
let selectedNode = null;
let currentEdges = [];  // raw visible edges (from/to are NodeId strings)

// ── D3 refs ────────────────────────────────────────────────────────────────
let nodeSel, treeLinkSel, crossLinkSel;
let posMap = new Map(); // nodeId → { x, y (Cartesian), angle (radians) }

const svgEl    = d3.select('#svg');
const rootEl   = d3.select('#root');
const tooltip  = document.getElementById('tooltip');
const statsEl  = document.getElementById('stats');
const errorEl  = document.getElementById('error-msg');
const detPanel = document.getElementById('panel-detail');
const dBody    = document.getElementById('d-body');
const dName    = document.getElementById('d-name');

// ── Zoom ───────────────────────────────────────────────────────────────────
const zoom = d3.zoom().scaleExtent([0.05, 12])
  .on('zoom', e => rootEl.attr('transform', e.transform));
svgEl.call(zoom);

function resetZoom() {
  const W = svgEl.node().clientWidth, H = svgEl.node().clientHeight;
  svgEl.transition().duration(500)
    .call(zoom.transform, d3.zoomIdentity.translate(W / 2, H / 2).scale(0.9));
}
document.getElementById('reset-btn').addEventListener('click', resetZoom);

// ── Load ───────────────────────────────────────────────────────────────────
function loadGraph(data) {
  if (!Array.isArray(data?.nodes) || !Array.isArray(data?.edges))
    throw new Error('JSON must have "nodes" and "edges" arrays.');
  rawData = data;
  selectedNode = null;
  detPanel.classList.remove('vis');
  errorEl.textContent = '';
  buildFilterPanel();
  renderGraph();
}

// ── Build defines-tree hierarchy ───────────────────────────────────────────
function buildHierarchy(visNodes, visEdges) {
  // Clone nodes and attach children arrays
  const nodeMap = new Map(visNodes.map(n => [n.id, { ...n, _children: [] }]));
  const childIds = new Set();

  visEdges.filter(e => e.kind === 'defines' || e.kind === 'contains').forEach(e => {
    const p = nodeMap.get(e.from);
    const c = nodeMap.get(e.to);
    if (p && c) { p._children.push(c); childIds.add(e.to); }
  });

  // Roots: nodes with no incoming defines/contains edge that are still visible
  const roots = visNodes
    .filter(n => !childIds.has(n.id))
    .map(n => nodeMap.get(n.id));

  if (roots.length === 0) return null;
  if (roots.length === 1) return roots[0];

  // Virtual root for multi-file graphs
  return {
    id: '__root__', path: [''], kind: 'module', type: 'scope',
    _virtual: true, _children: roots,
  };
}

// ── Render ─────────────────────────────────────────────────────────────────
function renderGraph() {
  if (!rawData) return;

  rootEl.selectAll('*').remove();
  tooltip.style.visibility = 'hidden';
  posMap.clear();

  const visNodes = rawData.nodes.filter(n => !hiddenKinds.has(n.kind));
  const visIds   = new Set(visNodes.map(n => n.id));
  const visEdges = rawData.edges.filter(e =>
    !hiddenEdges.has(e.kind) && visIds.has(e.from) && visIds.has(e.to));

  currentEdges = visEdges;
  statsEl.textContent = `${visNodes.length} nodes · ${visEdges.length} edges`;

  // Hierarchy
  const hierarchyData = buildHierarchy(visNodes, visEdges);
  if (!hierarchyData) return;

  const W = svgEl.node().clientWidth  || 800;
  const H = svgEl.node().clientHeight || 600;
  const radius = Math.min(W, H) / 2 * 0.86;

  const hier = d3.hierarchy(hierarchyData, d => d._children?.length ? d._children : null);

  d3.tree()
    .size([2 * Math.PI, radius])
    .separation((a, b) => (a.parent === b.parent ? 1 : 2) / a.depth)
    (hier);

  // Build position map (Cartesian)
  hier.each(dn => {
    const x = Math.cos(dn.x - Math.PI / 2) * dn.y;
    const y = Math.sin(dn.x - Math.PI / 2) * dn.y;
    posMap.set(dn.data.id, { x, y, angle: dn.x, depth: dn.depth });
  });

  // Cross-links: non-structural edges where both ends are in the tree
  const crossLinks = visEdges.filter(e =>
    e.kind !== 'defines' && e.kind !== 'contains' && posMap.has(e.from) && posMap.has(e.to));

  // ── Draw tree edges ──────────────────────────────────────────────────────
  const linkRadial = d3.linkRadial().angle(d => d.x).radius(d => d.y);

  treeLinkSel = rootEl.append('g')
    .selectAll('path.edge').data(hier.links()).join('path')
    .attr('class', 'edge edge-defines')
    .attr('d', linkRadial);

  // ── Draw cross-links ─────────────────────────────────────────────────────
  crossLinkSel = rootEl.append('g')
    .selectAll('path.edge').data(crossLinks).join('path')
    .attr('class', d => `edge ${EDGES[d.kind]?.cls ?? ''}`)
    .attr('stroke', d => EDGES[d.kind]?.color ?? '#555')
    .attr('marker-end', d => {
      const m = EDGES[d.kind]?.marker;
      return m ? `url(#${m})` : null;
    })
    .attr('d', d => {
      const s = posMap.get(d.from), t = posMap.get(d.to);
      // Quadratic bezier through the center — arc visually distinct from tree edges
      const cx = 0, cy = 0;
      const dx = t.x - s.x, dy = t.y - s.y;
      const len = Math.hypot(dx, dy) || 1;
      // End point offset from target node boundary
      const tx = t.x - dx / len * (nr(rawData.nodes.find(n => n.id === d.to) ?? {}) + 8);
      const ty = t.y - dy / len * (nr(rawData.nodes.find(n => n.id === d.to) ?? {}) + 8);
      return `M${s.x},${s.y} Q${cx},${cy} ${tx},${ty}`;
    });

  // ── Draw nodes ───────────────────────────────────────────────────────────
  // Bind to raw node data (not d3 hierarchy nodes) — same pattern as graph-viz
  const allVisible = hier.descendants()
    .filter(dn => !dn.data._virtual)
    .map(dn => dn.data);

  nodeSel = rootEl.append('g')
    .selectAll('g.node').data(allVisible, d => d.id).join('g')
    .attr('class', `node${showLabels ? '' : ' no-lbl'}`)
    .attr('transform', d => {
      const p = posMap.get(d.id);
      return `translate(${p?.x ?? 0},${p?.y ?? 0})`;
    });

  nodeSel.append('circle')
    .attr('r',      d => nr(d))
    .attr('fill',   d => kfg(d).fill)
    .attr('stroke', d => kfg(d).stroke);

  // Radial labels: right half → label right / left half → label left (flipped)
  nodeSel.append('text')
    .attr('transform', d => {
      const p = posMap.get(d.id);
      if (!p) return '';
      const flip  = p.angle > Math.PI;
      const deg   = p.angle * 180 / Math.PI - 90;
      return `rotate(${flip ? deg + 180 : deg})`;
    })
    .attr('x', d => {
      const p = posMap.get(d.id);
      return (p?.angle ?? 0) > Math.PI ? -(nr(d) + 4) : (nr(d) + 4);
    })
    .attr('text-anchor', d => (posMap.get(d.id)?.angle ?? 0) > Math.PI ? 'end' : 'start')
    .text(d => d.path?.[d.path.length - 1] ?? d.id);

  // ── Interactions ─────────────────────────────────────────────────────────
  nodeSel
    .on('mouseover', (ev, d) => {
      if (!selectedNode) highlightNeighbours(d);
      tooltip.innerHTML = buildTooltip(d);
      tooltip.style.visibility = 'visible';
    })
    .on('mousemove', ev => {
      tooltip.style.top  = (ev.clientY - 12) + 'px';
      tooltip.style.left = (ev.clientX + 16) + 'px';
    })
    .on('mouseout', () => {
      tooltip.style.visibility = 'hidden';
      if (!selectedNode) clearFade();
    })
    .on('click', (ev, d) => {
      ev.stopPropagation();
      selectedNode = d;
      nodeSel.classed('sel', n => n.id === d.id);
      highlightNeighbours(d);
      showDetail(d);
    });

  svgEl.on('click', () => {
    selectedNode = null;
    clearFade();
    nodeSel?.classed('sel', false);
    detPanel.classList.remove('vis');
  });

  applySearch();
  resetZoom();
}

// ── Highlight ─────────────────────────────────────────────────────────────
function highlightNeighbours(d) {
  const id  = d.id;
  const nbs = new Set([id]);
  currentEdges.forEach(e => {
    if (e.from === id) nbs.add(e.to);
    if (e.to   === id) nbs.add(e.from);
  });

  nodeSel?.classed('sf', n => !nbs.has(n.id));
  treeLinkSel?.classed('sf', l =>
    l.source.data.id !== id && l.target.data.id !== id);
  crossLinkSel?.classed('sf', e =>
    e.from !== id && e.to !== id);
}

function clearFade() {
  nodeSel?.classed('sf', false);
  treeLinkSel?.classed('sf', false);
  crossLinkSel?.classed('sf', false);
}

// ── Tooltip ───────────────────────────────────────────────────────────────
function buildTooltip(d) {
  const c = kfg(d).stroke;
  const row = (k, v) => v != null
    ? `<div class="ttr"><span class="ttk">${k}</span><span class="ttv">${v}</span></div>` : '';
  const props = d.props
    ? Object.entries(d.props).filter(([,v]) => v != null && v !== false)
        .map(([k,v]) => row(k, String(v))).join('')
    : '';
  const depth = posMap.get(d.id)?.depth ?? 0;
  return `
    <span class="ttb" style="background:${c}22;color:${c}">${d.kind}</span>
    <div class="ttn">${d.path?.[d.path.length - 1] ?? d.id}</div>
    ${row('type', d.type)}
    ${row('depth', depth)}
    ${row('lines', formatAt(d.at))}
    ${props}`;
}

// ── Detail panel ──────────────────────────────────────────────────────────
function showDetail(d) {
  const c = kfg(d).stroke;
  dName.textContent = d.path?.[d.path.length - 1] ?? d.id;

  const nodeMap  = new Map(rawData.nodes.map(n => [n.id, n]));
  const outEdges = currentEdges.filter(e => e.from === d.id);
  const inEdges  = currentEdges.filter(e => e.to   === d.id);
  const depth    = posMap.get(d.id)?.depth ?? 0;

  const row = (k, v) => v != null
    ? `<div class="drow"><span class="dkey">${k}</span><span class="dval">${v}</span></div>` : '';

  const pathHtml = `<div class="dpath">${
    (d.path ?? []).map(s => `<span class="dseg">${s}</span>`).join('')
  }</div>`;

  const propsHtml = d.props
    ? Object.entries(d.props).filter(([,v]) => v != null && v !== false)
        .map(([k,v]) => row(k, String(v))).join('')
    : '';

  function edgeGroup(edges, label, isOut) {
    if (!edges.length) return '';
    const items = edges.map(e => {
      const otherId = isOut ? e.to : e.from;
      const other   = nodeMap.get(otherId) ?? { id: otherId, path: [otherId], kind: '?' };
      const oc      = kfg(other);
      const oname   = other.path?.[other.path.length - 1] ?? other.id;
      return `<div class="ni" data-id="${other.id}">
        <div class="ndot" style="background:${oc.stroke}"></div>
        <span>${oname}</span>
        <span class="nkind">${e.kind}</span>
      </div>`;
    }).join('');
    return `<div class="dsec">${label}</div><div class="nlist">${items}</div>`;
  }

  dBody.innerHTML = `
    <span class="dbadge" style="background:${c}22;color:${c}">${d.kind} · ${d.type}</span>
    ${pathHtml}
    ${row('id', d.id)}
    ${row('depth', depth)}
    ${row('lines', formatAt(d.at))}
    ${row('bytes', atBytes(d.at))}
    ${propsHtml ? `<div class="dsec">Properties</div>${propsHtml}` : ''}
    ${edgeGroup(outEdges, 'Outgoing', true)}
    ${edgeGroup(inEdges,  'Incoming', false)}`;

  // Navigate to neighbour
  dBody.querySelectorAll('.ni').forEach(el => {
    el.addEventListener('click', () => {
      const tgt = rawData.nodes.find(n => n.id === el.dataset.id);
      if (!tgt || !posMap.has(tgt.id)) return;
      selectedNode = tgt;
      nodeSel.classed('sel', n => n.id === tgt.id);
      highlightNeighbours(tgt);
      showDetail(tgt);
      const pos = posMap.get(tgt.id);
      const t   = d3.zoomTransform(svgEl.node());
      const W   = svgEl.node().clientWidth, H = svgEl.node().clientHeight;
      svgEl.transition().duration(380).call(
        zoom.transform,
        d3.zoomIdentity.translate(W / 2 - t.k * pos.x, H / 2 - t.k * pos.y).scale(t.k)
      );
    });
  });

  detPanel.classList.add('vis');
}

document.getElementById('d-close').addEventListener('click', () => {
  selectedNode = null;
  clearFade();
  nodeSel?.classed('sel', false);
  detPanel.classList.remove('vis');
});

// ── Filter panel ──────────────────────────────────────────────────────────
function buildFilterPanel() {
  if (!rawData) return;

  const kinds     = [...new Set(rawData.nodes.map(n => n.kind))].sort();
  const edgeKinds = [...new Set(rawData.edges.map(e => e.kind))].sort();

  const kindChips = kinds.map(k => {
    const c = KINDS[k] ?? KINDS.module;
    return `<div class="chip${hiddenKinds.has(k) ? ' off' : ''}" data-kind="${k}">
      <div class="dot" style="background:${c.stroke}"></div>${k}</div>`;
  }).join('');

  const edgeChips = edgeKinds.map(k => {
    const cfg = EDGES[k] ?? { color: '#555' };
    return `<div class="echip${hiddenEdges.has(k) ? ' off' : ''}" data-edge="${k}">
      <div class="edash" style="background:${cfg.color}"></div>${k}</div>`;
  }).join('');

  document.getElementById('panel-filters').innerHTML = `
    <div class="fs">
      <div class="ft">Node kind</div>
      <div class="chips" id="kind-chips">${kindChips}</div>
    </div>
    <div class="fs">
      <div class="ft">Edge kind</div>
      <div class="chips" id="edge-chips">${edgeChips}</div>
    </div>`;

  document.querySelectorAll('#kind-chips .chip').forEach(el => {
    el.addEventListener('click', () => {
      const k = el.dataset.kind;
      hiddenKinds.has(k) ? hiddenKinds.delete(k) : hiddenKinds.add(k);
      el.classList.toggle('off', hiddenKinds.has(k));
      renderGraph();
    });
  });

  document.querySelectorAll('#edge-chips .echip').forEach(el => {
    el.addEventListener('click', () => {
      const k = el.dataset.edge;
      hiddenEdges.has(k) ? hiddenEdges.delete(k) : hiddenEdges.add(k);
      el.classList.toggle('off', hiddenEdges.has(k));
      renderGraph();
    });
  });
}

// ── Search ────────────────────────────────────────────────────────────────
function applySearch() {
  if (!nodeSel) return;
  const q = searchQ.trim().toLowerCase();
  if (!q) { clearFade(); return; }

  const hits = new Set();
  nodeSel.each(d => {
    const last = (d.path?.[d.path.length - 1] ?? '').toLowerCase();
    const full = (d.path ?? []).join(' ').toLowerCase();
    if (last.includes(q) || full.includes(q)) hits.add(d.id);
  });

  nodeSel.classed('sf', d => !hits.has(d.id));
  treeLinkSel?.classed('sf', l =>
    !hits.has(l.source.data.id) && !hits.has(l.target.data.id));
  crossLinkSel?.classed('sf', e =>
    !hits.has(e.from) && !hits.has(e.to));
}

document.getElementById('search').addEventListener('input', e => {
  searchQ = e.target.value;
  if (!selectedNode) applySearch();
});

// ── Labels toggle ─────────────────────────────────────────────────────────
document.getElementById('labels-btn').addEventListener('click', function () {
  showLabels = !showLabels;
  this.classList.toggle('active', showLabels);
  nodeSel?.classed('no-lbl', !showLabels);
});

// ── File input ────────────────────────────────────────────────────────────
document.getElementById('file-input').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try { parseAndLoad(ev.target.result); }
    catch (err) { errorEl.textContent = err.message; }
  };
  reader.readAsText(file);
  e.target.value = '';
});

// ── Paste modal ───────────────────────────────────────────────────────────
const overlay   = document.getElementById('modal-overlay');
const pasteArea = document.getElementById('paste-area');
const modalErr  = document.getElementById('modal-error');

document.getElementById('paste-btn').addEventListener('click', () => {
  pasteArea.value = ''; modalErr.textContent = '';
  overlay.classList.add('open'); pasteArea.focus();
});
document.getElementById('modal-cancel').addEventListener('click', () =>
  overlay.classList.remove('open'));
overlay.addEventListener('click', e => {
  if (e.target === overlay) overlay.classList.remove('open');
});
document.getElementById('modal-load').addEventListener('click', () => {
  try { parseAndLoad(pasteArea.value.trim()); overlay.classList.remove('open'); }
  catch (err) { modalErr.textContent = err.message; }
});
pasteArea.addEventListener('keydown', e => {
  if (e.key === 'Enter' && (e.metaKey || e.ctrlKey))
    document.getElementById('modal-load').click();
  if (e.key === 'Escape') overlay.classList.remove('open');
});

function parseAndLoad(text) {
  let data;
  try { data = JSON.parse(text); }
  catch (e) { throw new Error(`Invalid JSON: ${e.message}`); }
  loadGraph(data);
}
