<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spine AST Graph</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
      background: #0d1117;
      color: #e6edf3;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Top bar ─────────────────────────────────────────── */
    #topbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 16px;
      background: #161b22;
      border-bottom: 1px solid #30363d;
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    #topbar h1 { font-size: 14px; font-weight: 600; color: #58a6ff; letter-spacing: 0.5px; }

    .tb-btn {
      font-size: 11px;
      font-family: inherit;
      padding: 4px 10px;
      border-radius: 5px;
      border: 1px solid #30363d;
      background: #21262d;
      color: #e6edf3;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
      white-space: nowrap;
    }
    .tb-btn:hover { border-color: #58a6ff; color: #58a6ff; }

    input[type="file"] {
      font-size: 11px;
      font-family: inherit;
      color: #e6edf3;
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 5px;
      padding: 4px 8px;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    input[type="file"]:hover { border-color: #58a6ff; }

    #stats { font-size: 11px; color: #8b949e; }
    #error-msg { font-size: 11px; color: #f78166; }
    #reset-btn { margin-left: auto; }

    /* ── Canvas ──────────────────────────────────────────── */
    #canvas { flex: 1; position: relative; overflow: hidden; }
    svg { width: 100%; height: 100%; display: block; }

    /* ── Edges ───────────────────────────────────────────── */
    .link-defines { stroke: #30363d; stroke-width: 1.2; }
    .link-imports { stroke: #388bfd; stroke-width: 1.2; stroke-dasharray: 5 3; opacity: 0.7; }

    /* ── Nodes ───────────────────────────────────────────── */
    .node circle { stroke-width: 1.5; cursor: pointer; }
    .node circle:hover { filter: brightness(1.4); }
    .node.faded circle { opacity: 0.12; }
    .node.faded text  { opacity: 0.06; }
    .node text {
      font-size: 10px;
      fill: #e6edf3;
      pointer-events: none;
      dominant-baseline: middle;
      user-select: none;
    }

    /* ── Legend ──────────────────────────────────────────── */
    #legend {
      position: absolute;
      bottom: 16px;
      left: 16px;
      background: rgba(22, 27, 34, 0.92);
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 11px;
      display: flex;
      flex-direction: column;
      gap: 5px;
      pointer-events: none;
      backdrop-filter: blur(4px);
    }
    .leg-title { font-size: 10px; color: #8b949e; letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 2px; }
    .leg-row   { display: flex; align-items: center; gap: 7px; color: #c9d1d9; }
    .leg-dot   { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .leg-dash  { width: 20px; height: 2px; flex-shrink: 0; border-radius: 1px; }

    /* ── Tooltip ─────────────────────────────────────────── */
    #tooltip {
      position: fixed;
      visibility: hidden;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 7px;
      padding: 9px 13px;
      font-size: 11px;
      pointer-events: none;
      max-width: 320px;
      line-height: 1.6;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
      z-index: 100;
    }
    #tooltip .tt-name  { font-weight: 600; color: #e6edf3; margin-bottom: 4px; font-size: 12px; }
    #tooltip .tt-row   { display: flex; gap: 6px; }
    #tooltip .tt-key   { color: #8b949e; flex-shrink: 0; }
    #tooltip .tt-val   { color: #c9d1d9; word-break: break-all; }
    #tooltip .tt-badge { display: inline-block; padding: 1px 6px; border-radius: 4px; font-size: 10px; font-weight: 600; margin-bottom: 5px; }

    /* ── Paste modal ─────────────────────────────────────── */
    #modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    #modal-overlay.open { display: flex; }
    #modal {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 18px 20px;
      width: min(600px, 90vw);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #modal h2 { font-size: 13px; color: #e6edf3; }
    #modal p  { font-size: 11px; color: #8b949e; }
    #paste-area {
      width: 100%;
      height: 200px;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #e6edf3;
      font-family: inherit;
      font-size: 11px;
      padding: 8px;
      resize: vertical;
      outline: none;
    }
    #paste-area:focus { border-color: #58a6ff; }
    #modal-error { font-size: 11px; color: #f78166; min-height: 1em; }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
  </style>
</head>
<body>

<div id="topbar">
  <h1>Spine AST</h1>

  <label for="file-input" class="tb-btn" style="cursor:pointer">Load JSON</label>
  <input type="file" id="file-input" accept=".json,application/json" style="display:none" />

  <button class="tb-btn" id="paste-btn">Paste JSON</button>
  <button class="tb-btn" id="sample-btn">Load sample</button>

  <span id="stats"></span>
  <span id="error-msg"></span>
  <button class="tb-btn" id="reset-btn">Reset zoom</button>
</div>

<div id="canvas">
  <svg id="svg">
    <defs>
      <marker id="arrow-defines" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
        <path d="M0,0 L0,6 L6,3 z" fill="#444c56" />
      </marker>
      <marker id="arrow-imports" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
        <path d="M0,0 L0,6 L6,3 z" fill="#388bfd" opacity="0.8" />
      </marker>
    </defs>
    <g id="root"></g>
  </svg>

  <div id="legend">
    <div class="leg-title">Node kind</div>
    <div class="leg-row"><div class="leg-dot" style="background:#58a6ff;border:2px solid #79c0ff"></div> class</div>
    <div class="leg-row"><div class="leg-dot" style="background:#a371f7;border:2px solid #bc8cff"></div> method</div>
    <div class="leg-row"><div class="leg-dot" style="background:#3fb950;border:2px solid #56d364"></div> function</div>
    <div class="leg-row"><div class="leg-dot" style="background:#d29922;border:2px solid #e3b341"></div> member</div>
    <div class="leg-row"><div class="leg-dot" style="background:#f78166;border:2px solid #ffa198"></div> variable</div>
    <div class="leg-row"><div class="leg-dot" style="background:#8b949e;border:2px solid #adbac7"></div> module</div>
    <div class="leg-row"><div class="leg-dot" style="background:#388bfd;border:2px solid #79c0ff"></div> import</div>
    <div class="leg-title" style="margin-top:6px">Edge kind</div>
    <div class="leg-row"><div class="leg-dash" style="background:#444c56"></div> defines</div>
    <div class="leg-row"><div class="leg-dash" style="background:#388bfd;opacity:0.8"></div> imports (dashed)</div>
  </div>
</div>

<div id="tooltip"></div>

<!-- Paste modal -->
<div id="modal-overlay">
  <div id="modal">
    <h2>Paste graph JSON</h2>
    <p>Paste the output of <code>spine query</code> or any <code>{ nodes, edges }</code> JSON.</p>
    <textarea id="paste-area" placeholder='{ "nodes": [...], "edges": [...] }'></textarea>
    <div id="modal-error"></div>
    <div class="modal-actions">
      <button class="tb-btn" id="modal-cancel">Cancel</button>
      <button class="tb-btn" id="modal-load" style="border-color:#3fb950;color:#3fb950">Load</button>
    </div>
  </div>
</div>

// ── Colour + size by kind ──────────────────────────────────────────────────
const KIND_COLOUR = {
  class:    { fill: '#1c3a5e', stroke: '#58a6ff' },
  method:   { fill: '#2d1f4e', stroke: '#a371f7' },
  function: { fill: '#1a3a27', stroke: '#3fb950' },
  member:   { fill: '#3d2e0a', stroke: '#d29922' },
  variable: { fill: '#3d1e1a', stroke: '#f78166' },
  type:     { fill: '#2a2a2a', stroke: '#c9d1d9' },
  module:   { fill: '#21262d', stroke: '#adbac7' },
  import:   { fill: '#0d2745', stroke: '#388bfd' },
};

function nodeColour(d) {
  if (d.path[0]?.startsWith('node:')) return KIND_COLOUR.import;
  return KIND_COLOUR[d.kind] ?? KIND_COLOUR.module;
}

function nodeRadius(d) {
  if (d.path?.length === 1) return 14;        // root module or external
  if (d.kind === 'class')   return 10;
  if (d.kind === 'module')  return 8;
  if (d.type === 'scope')   return 7;
  return 5;
}

// ── One-time SVG + zoom setup ──────────────────────────────────────────────
const svg  = d3.select('#svg');
const root = d3.select('#root');
const tooltip = document.getElementById('tooltip');
const statsEl = document.getElementById('stats');
const errorEl = document.getElementById('error-msg');

const zoom = d3.zoom()
  .scaleExtent([0.1, 8])
  .on('zoom', e => root.attr('transform', e.transform));

svg.call(zoom);

document.getElementById('reset-btn').addEventListener('click', () => {
  const W = svg.node().clientWidth;
  const H = svg.node().clientHeight;
  svg.transition().duration(500)
    .call(zoom.transform, d3.zoomIdentity.translate(W / 2, H / 2).scale(0.85));
});

// ── Active simulation handle (so we can stop it on reload) ─────────────────
let activeSimulation = null;

// ── Core: load & render a graph ────────────────────────────────────────────
function loadGraph(data) {
  // Validate minimal shape
  if (!Array.isArray(data?.nodes) || !Array.isArray(data?.edges)) {
    throw new Error('JSON must have "nodes" and "edges" arrays.');
  }

  // Stop previous simulation
  if (activeSimulation) {
    activeSimulation.stop();
    activeSimulation = null;
  }

  // Clear canvas
  root.selectAll('*').remove();
  tooltip.style.visibility = 'hidden';
  errorEl.textContent = '';

  const nodes = data.nodes.map(n => ({ ...n }));
  const links = data.edges.map(e => ({ source: e.from, target: e.to, kind: e.kind }));

  statsEl.textContent = `${nodes.length} nodes · ${links.length} edges`;

  // ── Simulation ──────────────────────────────────────────────────────────
  const simulation = d3.forceSimulation(nodes)
    .force('link', d3.forceLink(links)
      .id(d => d.id)
      .distance(d => d.kind === 'imports' ? 160 : 55)
      .strength(d => d.kind === 'imports' ? 0.3 : 0.8))
    .force('charge', d3.forceManyBody()
      .strength(d => d.kind === 'class' ? -280 : d.type === 'scope' ? -140 : -60))
    .force('center', d3.forceCenter(0, 0))
    .force('collision', d3.forceCollide().radius(d => nodeRadius(d) + 4))
    .alphaDecay(0.025);

  activeSimulation = simulation;

  // ── Edges ───────────────────────────────────────────────────────────────
  const linkSel = root.append('g')
    .selectAll('line')
    .data(links)
    .join('line')
    .attr('class', d => `link-${d.kind}`)
    .attr('marker-end', d => `url(#arrow-${d.kind})`);

  // ── Nodes ───────────────────────────────────────────────────────────────
  const nodeSel = root.append('g')
    .selectAll('.node')
    .data(nodes, d => d.id)
    .join('g')
    .attr('class', 'node')
    .call(d3.drag()
      .on('start', (event, d) => {
        if (!event.active) simulation.alphaTarget(0.3).restart();
        d.fx = d.x; d.fy = d.y;
      })
      .on('drag',  (event, d) => { d.fx = event.x; d.fy = event.y; })
      .on('end',   (event, d) => {
        if (!event.active) simulation.alphaTarget(0);
        d.fx = null; d.fy = null;
      }));

  nodeSel.append('circle')
    .attr('r',      d => nodeRadius(d))
    .attr('fill',   d => nodeColour(d).fill)
    .attr('stroke', d => nodeColour(d).stroke);

  nodeSel.append('text')
    .attr('x', d => nodeRadius(d) + 4)
    .attr('y', 0)
    .text(d => d.path?.[d.path.length - 1] ?? d.id);

  // ── Tooltip + highlight ─────────────────────────────────────────────────
  function ttRow(key, val) {
    if (val == null) return '';
    return `<div class="tt-row"><span class="tt-key">${key}</span><span class="tt-val">${val}</span></div>`;
  }

  nodeSel
    .on('mouseover', (event, d) => {
      const c = nodeColour(d).stroke;
      const propsHtml = d.props
        ? Object.entries(d.props)
            .filter(([, v]) => v != null && v !== false)
            .map(([k, v]) => ttRow(k, String(v)))
            .join('')
        : '';
      tooltip.innerHTML = `
        <span class="tt-badge" style="background:${c}22;color:${c}">${d.kind}</span>
        <div class="tt-name">${d.path?.[d.path.length - 1] ?? d.id}</div>
        ${ttRow('type', d.type)}
        ${ttRow('path', d.path?.join(' › '))}
        ${ttRow('lines', d.range?.line?.replace(/L/g, ''))}
        ${propsHtml}
      `;
      tooltip.style.visibility = 'visible';

      const neighbours = new Set([d.id]);
      links.forEach(l => {
        if (l.source.id === d.id) neighbours.add(l.target.id);
        if (l.target.id === d.id) neighbours.add(l.source.id);
      });
      nodeSel.classed('faded', n => !neighbours.has(n.id));
      linkSel.attr('opacity', l =>
        l.source.id === d.id || l.target.id === d.id ? 1 : 0.05);
    })
    .on('mousemove', event => {
      tooltip.style.top  = (event.clientY - 12) + 'px';
      tooltip.style.left = (event.clientX + 16) + 'px';
    })
    .on('mouseout', () => {
      tooltip.style.visibility = 'hidden';
      nodeSel.classed('faded', false);
      linkSel.attr('opacity', 1);
    });

  // ── Tick ────────────────────────────────────────────────────────────────
  simulation.on('tick', () => {
    linkSel
      .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
      .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
    nodeSel.attr('transform', d => `translate(${d.x},${d.y})`);
  });

  // Center after layout settles
  simulation.on('end', () => {
    const W = svg.node().clientWidth;
    const H = svg.node().clientHeight;
    svg.call(zoom.transform, d3.zoomIdentity.translate(W / 2, H / 2).scale(0.85));
  });
}

// ── Parse + validate JSON string ──────────────────────────────────────────
function parseAndLoad(text) {
  let data;
  try { data = JSON.parse(text); } catch (e) {
    throw new Error(`Invalid JSON: ${e.message}`);
  }
  loadGraph(data);
}

// ── File input ─────────────────────────────────────────────────────────────
document.getElementById('file-input').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      parseAndLoad(ev.target.result);
    } catch (err) {
      errorEl.textContent = err.message;
    }
  };
  reader.readAsText(file);
  // Reset so same file can be re-selected
  e.target.value = '';
});

// ── Paste modal ────────────────────────────────────────────────────────────
const overlay   = document.getElementById('modal-overlay');
const pasteArea = document.getElementById('paste-area');
const modalErr  = document.getElementById('modal-error');

document.getElementById('paste-btn').addEventListener('click', () => {
  pasteArea.value = '';
  modalErr.textContent = '';
  overlay.classList.add('open');
  pasteArea.focus();
});

document.getElementById('modal-cancel').addEventListener('click', () => {
  overlay.classList.remove('open');
});

overlay.addEventListener('click', e => {
  if (e.target === overlay) overlay.classList.remove('open');
});

document.getElementById('modal-load').addEventListener('click', () => {
  try {
    parseAndLoad(pasteArea.value.trim());
    overlay.classList.remove('open');
  } catch (err) {
    modalErr.textContent = err.message;
  }
});

// Cmd/Ctrl+Enter submits from inside the textarea
pasteArea.addEventListener('keydown', e => {
  if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) {
    document.getElementById('modal-load').click();
  }
  if (e.key === 'Escape') overlay.classList.remove('open');
});

// ── Load sample ────────────────────────────────────────────────────────────
document.getElementById('sample-btn').addEventListener('click', () => {
  errorEl.textContent = '';
  loadGraph(SAMPLE);
});

// ── Boot with sample data ──────────────────────────────────────────────────
loadGraph(SAMPLE);
</script>
