name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# disable husky
env:
  HUSKY: "0"

jobs:
  test_on_node:
    name: Test
    strategy:
      matrix:
        os: [ubuntu-latest]
        node-version: [22.x]  # drop 24.x, 25.x — no prebuilt tree-sitter binaries
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm  # this only caches the pnpm store, not built natives

      # Cache native build artifacts separately
      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: |
            node_modules
            packages/*/node_modules
          key: ${{ runner.os }}-node${{ matrix.node-version }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-node${{ matrix.node-version }}-

      - name: Install build tools
        run: sudo apt-get install -y python3 make g++

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm -r build && pnpm build
      - name: Check types
        run: pnpm -r check-types && pnpm check-types
      - name: Run linter
        run: pnpm lint

      # - name: Run tests
      #   run: pnpm test
