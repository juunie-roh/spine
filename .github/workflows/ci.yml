name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# disable husky
env:
  HUSKY: "0"

jobs:
  test_on_node:
    name: Test
    strategy:
      matrix:
        os: [ubuntu-latest]
        node-version: [22.x, 24.x, 25.x]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run linter
        run: pnpm lint

      - name: Check types
        run: pnpm -r check-types

      - name: Build package
        run: pnpm -r build

      # - name: Run tests
      #   run: pnpm test
